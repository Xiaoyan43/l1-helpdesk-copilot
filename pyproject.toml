[tool.pytest.ini_options]
pythonpath = ["."]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["app", "eval", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]  # FastAPI Depends() in defaults is intentional

[tool.mypy]
python_version = "3.11"
files = ["app"]
ignore_missing_imports = true
warn_unused_ignores = true
check_untyped_defs = true
no_implicit_optional = true
